<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pagos de Renta</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<meta name="theme-color" content="#2563eb" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app">
  <header>
    <h1>🏠 Pagos de Renta</h1>
  </header>

  <section class="month-nav">
    <button id="prevMonth" aria-label="Mes anterior">‹</button>
    <h2 id="monthLabel"></h2>
    <button id="nextMonth" aria-label="Mes siguiente">›</button>
  </section>

  <section class="card">
    <div class="section-header">
      <h2>Pagos de este mes</h2>
      <span id="pendingBadge" class="badge"></span>
    </div>
    <ul id="paymentsList" class="payments-list"></ul>
  </section>
</div>

<div class="bottom-bar">
  <button id="exportPdf" class="bottom-btn">Calendario</button>
</div>

<div id="addModal" class="modal-overlay">
  <div class="modal-sheet">
    <div class="modal-header">
      <h2>Agregar Pago</h2>
      <button id="closeModal" class="icon-btn" aria-label="Cerrar">✕</button>
    </div>
    <form id="paymentForm">
      <input type="text" id="label" placeholder="Descripción (ej. Cuarto 1 - Juan)" required />
      <input type="number" id="day" placeholder="Día del mes (1-31)" min="1" max="31" required />
      <input type="number" id="amount" placeholder="Monto ($)" min="0" step="0.01" required />
      <button type="submit">Agregar Pago</button>
    </form>
  </div>
</div>

<div id="payModal" class="modal-overlay">
  <div class="modal-sheet">
    <div class="modal-header">
      <h2>Registrar Pago</h2>
      <button id="closePayModal" class="icon-btn" aria-label="Cerrar">✕</button>
    </div>
    <p id="payModalInfo" class="pay-modal-info"></p>
    <form id="payForm">
      <input type="number" id="paidAmount" placeholder="Monto pagado ($)" min="0" step="0.01" required />
      <button type="submit">Confirmar</button>
    </form>
  </div>
</div>

<div id="printArea">
  <h1 id="printTitle"></h1>
  <div id="printCalendar" class="calendar-grid"></div>
  <div class="legend">
    <span><i class="dot received"></i> Recibido</span>
    <span><i class="dot partial"></i> Parcial</span>
    <span><i class="dot pending"></i> Pendiente</span>
  </div>
  <table id="printTable" class="print-table"></table>
</div>

<script src="app.js"></script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => navigator.serviceWorker.register("sw.js"));
  }
</script>
</body>
</html>
